<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Logistik - LogistikKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-custom { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dropdown-pencarian { 
            max-height: 200px; 
            overflow-y: auto; 
            position: absolute; 
            z-index: 1050; 
            width: 100%; 
        }
        .nav-pills .nav-link { color: #6c757d; font-weight: bold; background-color: transparent; }
        .nav-pills .nav-link.active { color: #fff; background-color: #0d6efd; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">📦 LogistikKu</h3>
        <p class="text-muted small">Sistem Persediaan Barang Real-Time</p>
    </div>

    <ul class="nav nav-pills mb-4 justify-content-center bg-white p-1 rounded shadow-sm" id="logistikTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active w-100" id="update-tab" data-bs-toggle="pill" data-bs-target="#panelUpdate" type="button" role="tab" aria-controls="panelUpdate" aria-selected="true">🔄 Update Stok</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link w-100" id="baru-tab" data-bs-toggle="pill" data-bs-target="#panelBaru" type="button" role="tab" aria-controls="panelBaru" aria-selected="false">➕ Barang Baru</button>
        </li>
    </ul>

    <div class="tab-content" id="logistikTabContent">
        
        <div class="tab-pane fade show active" id="panelUpdate" role="tabpanel" aria-labelledby="update-tab">
            <div class="card card-custom border-0 mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3 text-secondary">📥 / 📤 Transaksi Stok</h5>
                    <form id="formTransaksi">
                        
                        <div class="mb-3 position-relative">
                            <label class="form-label small fw-bold text-dark">Nama Barang (Ketik untuk Mencari)</label>
                            <input type="text" id="txNamaBarang" class="form-control" placeholder="Cari nama barang di sini..." autocomplete="off">
                            <div id="dropdownHasil" class="list-group dropdown-pencarian shadow-sm d-none"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">ID Barang</label>
                            <input type="text" id="txId" class="form-control bg-light" placeholder="Otomatis terisi..." readonly>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-secondary">Kategori</label>
                                <input type="text" id="txKategori" class="form-control bg-light form-control-sm" placeholder="Otomatis..." readonly>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-secondary">Lokasi Rak</label>
                                <input type="text" id="txLokasi" class="form-control bg-light form-control-sm" placeholder="Otomatis..." readonly>
                            </div>
                        </div>

                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-info">Stok Saat Ini</label>
                                <input type="text" id="txStokSekarang" class="form-control bg-info-subtle fw-bold text-center text-dark" value="-" readonly>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-dark">Jumlah Perubahan</label>
                                <input type="number" id="txJumlah" class="form-control fw-bold text-center text-primary" min="1" value="1">
                            </div>
                        </div>
                        
                        <div class="row g-2">
                            <div class="col-6">
                                <button type="button" onclick="kirimTransaksi('masuk')" class="btn btn-success w-100 fw-bold py-2">📥 Barang Masuk</button>
                            </div>
                            <div class="col-6">
                                <button type="button" onclick="kirimTransaksi('keluar')" class="btn btn-danger w-100 fw-bold py-2">📤 Barang Keluar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="panelBaru" role="tabpanel" aria-labelledby="baru-tab">
            <div class="card card-custom border-0 mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3 text-secondary">📝 Registrasi Item Baru</h5>
                    <form id="formBarangBaru">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-dark">ID Barang Baru</label>
                            <input type="text" id="newId" class="form-control" placeholder="Contoh: BRG004" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-dark">Nama Barang</label>
                            <input type="text" id="newNama" class="form-control" placeholder="Masukkan nama barang lengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-dark">Kategori</label>
                            <input type="text" id="newKategori" class="form-control" placeholder="Contoh: ATK, Medis, Cairan" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-dark">Stok Awal</label>
                                <input type="number" id="newStok" class="form-control" min="0" value="0" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-dark">Lokasi Rak</label>
                                <input type="text" id="newLokasi" class="form-control" placeholder="Contoh: Rak C-1" required>
                            </div>
                        </div>
                        <button type="button" onclick="tambahBarangBaru()" class="btn btn-primary w-100 fw-bold py-2">💾 Simpan Barang Baru</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <div class="card card-custom border-0">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="card-title fw-bold m-0 text-secondary">Data Gudang Saat Ini</h6>
                <button onclick="muatDataStok()" class="btn btn-sm btn-outline-secondary">🔄 Refresh</button>
            </div>
            <div id="loading" class="text-center my-3 text-muted small">Memuat database...</div>
            <div class="list-group list-group-flush" id="listStok"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbwDucogQ2PHEaODrG8hIhddfl9MzhiKlaruLYLE5ajU/dev"; 

    let masterDataBarang = []; 

    document.addEventListener("DOMContentLoaded", muatDataStok);

    // Ambil Data dari Google Sheets
    async function muatDataStok() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('listStok').innerHTML = '';
        
        try {
            let response = await fetch(API_URL);
            masterDataBarang = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            renderListUtama(masterDataBarang);
            inisialisasiPencarianForm();

        } catch (error) {
            document.getElementById('loading').innerText = 'Gagal sinkronisasi data.';
            console.error(error);
        }
    }

    // Tampilkan Daftar Stok Utama di Bawah
    function renderListUtama(data) {
        const container = document.getElementById('listStok');
        container.innerHTML = '';
        
        data.forEach(item => {
            let badgeColor = item.stok <= 5 ? 'bg-danger' : 'bg-primary';
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                    <div>
                        <strong class="text-dark d-block mb-0">${item.nama}</strong>
                        <span class="text-muted small">${item.id} • ${item.kategori} • Lokasi: ${item.lokasi}</span>
                    </div>
                    <span class="badge ${badgeColor} rounded-pill fs-6">${item.stok}</span>
                </div>
            `;
        });
    }

    // Pencarian Otomatis Nama Barang di Tab Update Stok
    function inisialisasiPencarianForm() {
        const inputNama = document.getElementById('txNamaBarang');
        const dropdown = document.getElementById('dropdownHasil');

        inputNama.addEventListener('input', function() {
            let keyword = this.value.toLowerCase();
            dropdown.innerHTML = '';

            if (keyword.length === 0) {
                dropdown.classList.add('d-none');
                resetFormUpdateOtomatis();
                return;
            }

            let hasilFilter = masterDataBarang.filter(item => 
                item.nama.toLowerCase().includes(keyword)
            );

            if (hasilFilter.length > 0) {
                dropdown.classList.remove('d-none');
                hasilFilter.forEach(item => {
                    let tombolItem = document.createElement('button');
                    tombolItem.type = 'button';
                    tombolItem.className = 'list-group-item list-group-item-action text-start small';
                    tombolItem.innerHTML = `<b>${item.nama}</b> <span class="text-muted">(${item.id})</span>`;
                    
                    tombolItem.addEventListener('click', function() {
                        document.getElementById('txNamaBarang').value = item.nama;
                        document.getElementById('txId').value = item.id;
                        document.getElementById('txKategori').value = item.kategori;
                        document.getElementById('txLokasi').value = item.lokasi;
                        document.getElementById('txStokSekarang').value = item.stok + " pcs";
                        dropdown.classList.add('d-none');
                    });
                    dropdown.appendChild(tombolItem);
                });
            } else {
                dropdown.innerHTML = '<div class="list-group-item text-muted small">Barang tidak ditemukan</div>';
                dropdown.classList.remove('d-none');
                resetFormUpdateOtomatis();
            }
        });

        document.addEventListener('click', function(e) {
            if (e.target !== inputNama) {dropdown.classList.add('d-none');}
        });
    }

    function resetFormUpdateOtomatis() {
        document.getElementById('txId').value = "";
        document.getElementById('txKategori').value = "";
        document.getElementById('txLokasi').value = "";
        document.getElementById('txStokSekarang').value = "-";
    }

    // Eksekusi Update Stok (Masuk/Keluar)
    async function kirimTransaksi(jenis) {
        const id = document.getElementById('txId').value;
        const nama = document.getElementById('txNamaBarang').value;
        const jumlah = document.getElementById('txJumlah').value;

        if (!id) { alert('Pilih Nama Barang terlebih dahulu!'); return; }
        if (!jumlah || jumlah < 1) { alert('Masukkan jumlah yang valid!'); return; }

        if (confirm(`Konfirmasi [ ${jenis.toUpperCase()} ]\nItem: ${nama}\nJumlah: ${jumlah} pcs`)) {
            try {
                let response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, jumlah: jumlah, jenis: jenis })
                });
                let hasil = await response.json();
                alert(hasil.status);
                document.getElementById('formTransaksi').reset();
                resetFormUpdateOtomatis();
                muatDataStok();
            } catch (error) { alert('Gagal memproses data.'); }
        }
    }

    // Eksekusi Tambah Barang Baru
    async function tambahBarangBaru() {
        const id = document.getElementById('newId').value.trim();
        const nama = document.getElementById('newNama').value.trim();
        const kategori = document.getElementById('newKategori').value.trim();
        const stok = document.getElementById('newStok').value;
        const lokasi = document.getElementById('newLokasi').value.trim();

        if (!id || !nama || !kategori || !lokasi) { alert('Lengkapi semua kolom!'); return; }

        try {
            let btn = document.querySelector("button[onclick='tambahBarangBaru()']");
            btn.disabled = true; btn.innerText = "⏳ Menyimpan...";

            let response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: id, nama: nama, kategori: kategori, stok: stok, lokasi: lokasi, jenis: 'baru' })
            });
            let hasil = await response.json();
            alert(hasil.status);
            
            btn.disabled = false; btn.innerText = "💾 Simpan Barang Baru";

            if(!hasil.status.includes("Error")) {
                document.getElementById('formBarangBaru').reset();
                muatDataStok();
                
                // Berpindah tab secara aman menggunakan Bootstrap JS Instance
                let firstTab = new bootstrap.Tab(document.getElementById('update-tab'));
                firstTab.show();
            }
        } catch (error) { alert('Gagal menyimpan.'); btn.disabled = false; }
    }
</script>
</body>
</html>
