<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Stok Barang - LogistikKu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-custom { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dropdown-pencarian { 
            max-height: 200px; 
            overflow-y: auto; 
            position: absolute; 
            z-index: 1050; 
            width: 100%; 
        }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">📦 LogistikKu</h3>
        <p class="text-muted small">Sistem Update Stok Terintegrasi</p>
    </div>

    <div class="card card-custom border-0 mb-4">
        <div class="card-body p-4">
            <h5 class="card-title fw-bold mb-4 text-secondary">📥 / 📤 Transaksi Stok</h5>
            <form id="formTransaksi">
                
                <div class="mb-3 position-relative">
                    <label class="form-label small fw-bold text-dark">Nama Barang (Ketik untuk Mencari)</label>
                    <input type="text" id="txNamaBarang" class="form-control" placeholder="Cari nama barang di sini..." autocomplete="off" required>
                    
                    <div id="dropdownHasil" class="list-group dropdown-pencarian shadow-sm d-none"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">ID Barang</label>
                    <input type="text" id="txId" class="form-control bg-light" placeholder="Otomatis terisi..." readonly>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-secondary">Kategori</label>
                        <input type="text" id="txKategori" class="form-control bg-light form-control-sm" placeholder="Otomatis..." readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold text-secondary">Lokasi Rak</label>
                        <input type="text" id="txLokasi" class="form-control bg-light form-control-sm" placeholder="Otomatis..." readonly>
                    </div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label class="form-label small fw-bold text-info">Stok Saat Ini</label>
                        <input type="text" id="txStokSekarang" class="form-control bg-info-subtle fw-bold text-center text-dark" value="-" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold text-dark">Jumlah Perubahan</label>
                        <input type="number" id="txJumlah" class="form-control fw-bold text-center text-primary" min="1" value="1" required>
                    </div>
                </div>
                
                <div class="row g-2">
                    <div class="col-6">
                        <button type="button" onclick="kirimTransaksi('masuk')" class="btn btn-success w-100 fw-bold py-2">📥 Barang Masuk</button>
                    </div>
                    <div class="col-6">
                        <button type="button" onclick="kirimTransaksi('keluar')" class="btn btn-danger w-100 fw-bold py-2">📤 Barang Keluar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card card-custom border-0">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="card-title fw-bold m-0 text-secondary">Semua Data Stok Terdaftar</h6>
                <button onclick="muatDataStok()" class="btn btn-sm btn-outline-secondary">🔄 Refresh</button>
            </div>
            
            <div id="loading" class="text-center my-3 text-muted small">Memuat database...</div>
            <div class="list-group list-group-flush" id="listStok"></div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbwDucogQ2PHEaODrG8hIhddfl9MzhiKlaruLYLE5ajU/dev"; 

    let masterDataBarang = []; // Database lokal untuk pencarian cepat

    document.addEventListener("DOMContentLoaded", muatDataStok);

    // 1. Fungsi Mengambil Data dari Google Sheets
    async function muatDataStok() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('listStok').innerHTML = '';
        
        try {
            let response = await fetch(API_URL);
            masterDataBarang = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            renderListUtama(masterDataBarang);
            inisialisasiPencarianForm();

        } catch (error) {
            document.getElementById('loading').innerText = 'Gagal memuat data dari database.';
            console.error(error);
        }
    }

    // 2. Tampilkan Daftar Stok Utama di Bagian Bawah
    function renderListUtama(data) {
        const container = document.getElementById('listStok');
        container.innerHTML = '';
        
        data.forEach(item => {
            let badgeColor = item.stok <= 5 ? 'bg-danger' : 'bg-primary';
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                    <div>
                        <strong class="text-dark d-block mb-0">${item.nama}</strong>
                        <span class="text-muted small">${item.id} • ${item.kategori} • Lokasi: ${item.lokasi}</span>
                    </div>
                    <span class="badge ${badgeColor} rounded-pill fs-6">${item.stok}</span>
                </div>
            `;
        });
    }

    // 3. Logika Pencarian Dinamis pada Kolom Nama Barang
    function inisialisasiPencarianForm() {
        const inputNama = document.getElementById('txNamaBarang');
        const dropdown = document.getElementById('dropdownHasil');

        inputNama.addEventListener('input', function() {
            let keyword = this.value.toLowerCase();
            dropdown.innerHTML = '';

            // Jika kolom nama dikosongkan, reset kolom otomatis lainnya
            if (keyword.length === 0) {
                dropdown.classList.add('d-none');
                resetFormOtomatis();
                return;
            }

            // Filter data berdasarkan nama barang
            let hasilFilter = masterDataBarang.filter(item => 
                item.nama.toLowerCase().includes(keyword)
            );

            if (hasilFilter.length > 0) {
                dropdown.classList.remove('d-none');
                hasilFilter.forEach(item => {
                    let tombolItem = document.createElement('button');
                    tombolItem.type = 'button';
                    tombolItem.className = 'list-group-item list-group-item-action text-start small';
                    tombolItem.innerHTML = `<b>${item.nama}</b> <span class="text-muted">(${item.id})</span>`;
                    
                    // Aksi ketika salah satu nama barang dipilih dari daftar pencarian
                    tombolItem.addEventListener('click', function() {
                        isiDataBarangOtomatis(item);
                    });
                    
                    dropdown.appendChild(tombolItem);
                });
            } else {
                dropdown.innerHTML = '<div class="list-group-item text-muted small">Nama barang tidak ditemukan</div>';
                dropdown.classList.remove('d-none');
                resetFormOtomatis();
            }
        });

        // Tutup dropdown jika klik di area luar
        document.addEventListener('click', function(e) {
            if (e.target !== inputNama) {
                dropdown.classList.add('d-none');
            }
        });
    }

    // 4. Memasukkan Data secara Otomatis ke Kolom Lain setelah Nama Barang Dipilih
    function isiDataBarangOtomatis(item) {
        document.getElementById('txNamaBarang').value = item.nama;
        document.getElementById('txId').value = item.id;
        document.getElementById('txKategori').value = item.kategori;
        document.getElementById('txLokasi').value = item.lokasi;
        document.getElementById('txStokSekarang').value = item.stok + " pcs";
        
        document.getElementById('dropdownHasil').classList.add('d-none');
    }

    // Fungsi Pembantu untuk Mengosongkan Kolom jika nama barang dihapus
    function resetFormOtomatis() {
        document.getElementById('txId').value = "";
        document.getElementById('txKategori').value = "";
        document.getElementById('txLokasi').value = "";
        document.getElementById('txStokSekarang').value = "-";
    }

    // 5. Fungsi Mengirim Transaksi Update Stok ke Google Sheets
    async function kirimTransaksi(jenis) {
        const id = document.getElementById('txId').value;
        const nama = document.getElementById('txNamaBarang').value;
        const jumlah = document.getElementById('txJumlah').value;

        if (!id) {
            alert('Silakan cari dan pilih Nama Barang terlebih dahulu melalui kolom pencarian!');
            return;
        }

        if (!jumlah || jumlah < 1) {
            alert('Masukkan jumlah transaksi yang valid!');
            return;
        }

        if (confirm(`Konfirmasi pencatatan barang [ ${jenis.toUpperCase()} ]\n\nBarang: ${nama}\nJumlah: ${jumlah} pcs`)) {
            try {
                let response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, jumlah: jumlah, jenis: jenis })
                });
                let hasil = await response.json();
                
                alert(hasil.status);
                
                // Reset seluruh form ke keadaan awal
                document.getElementById('formTransaksi').reset();
                resetFormOtomatis();
                
                // Perbarui database lokal dan daftar visual bawah
                muatDataStok();
            } catch (error) {
                alert('Gagal memproses perubahan stok ke Google Sheets.');
                console.error(error);
            }
        }
    }
</script>
</body>
</html>
