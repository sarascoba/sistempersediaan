<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsite Persediaan Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-custom { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-tabs .nav-link { color: #6c757d; font-weight: bold; }
        .nav-tabs .nav-link.active { color: #0d6efd; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">📦 LogistikKu</h3>
        <p class="text-muted small">Sistem Manajemen Stok Ringan</p>
    </div>

    <!-- Pilihan Menu Tab -->
    <ul class="nav nav-tabs mb-3 border-0 justify-content-center" id="menuTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active border-0 bg-transparent" id="update-tab" data-bs-toggle="tab" data-bs-target="#panelUpdate" type="button">Update Stok</button>
        </li>
        <li class="nav-item">
            <button class="nav-link border-0 bg-transparent" id="baru-tab" data-bs-toggle="tab" data-bs-target="#panelBaru" type="button">+ Barang Baru</button>
        </li>
    </ul>

    <div class="tab-content">
        <!-- PANEL UPDATE STOK -->
        <div class="tab-pane fade show active" id="panelUpdate">
            <div class="card card-custom border-0 mb-4">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-3">Transaksi Stok</h5>
                    <form id="formTransaksi">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">ID Barang</label>
                            <input type="text" id="txId" class="form-control" placeholder="Contoh: BRG001" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Jumlah</label>
                            <input type="number" id="txJumlah" class="form-control" min="1" value="1" required>
                        </div>
                        <div class="row g-2">
                            <div class="col">
                                <button type="button" onclick="kirimTransaksi('masuk')" class="btn btn-success w-100 fw-bold">📥 Barang Masuk</button>
                            </div>
                            <div class="col">
                                <button type="button" onclick="kirimTransaksi('keluar')" class="btn btn-danger w-100 fw-bold">📤 Barang Keluar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- PANEL TAMBAH BARANG BARU -->
        <div class="tab-pane fade" id="panelBaru">
            <div class="card card-custom border-0 mb-4">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-3">Tambah Item Baru ke Database</h5>
                    <form id="formBarangBaru">
                        <div class="mb-2">
                            <label class="form-label small fw-bold">ID Barang</label>
                            <input type="text" id="newId" class="form-control form-control-sm" placeholder="BRG004" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Nama Barang</label>
                            <input type="text" id="newNama" class="form-control form-control-sm" placeholder="Nama item lengkap" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Kategori</label>
                            <input type="text" id="newKategori" class="form-control form-control-sm" placeholder="Contoh: ATK, Medis, dll" required>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold">Stok Awal</label>
                                <input type="number" id="newStok" class="form-control form-control-sm" min="0" value="0" required>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold">Lokasi Rak</label>
                                <input type="text" id="newLokasi" class="form-control form-control-sm" placeholder="Rak C-3" required>
                            </div>
                        </div>
                        <button type="button" onclick="tambahBarangBaru()" class="btn btn-primary w-100 fw-bold">💾 Simpan Barang Baru</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Monitor Stok -->
    <div class="card card-custom border-0">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title fw-bold m-0">Data Stok Saat Ini</h5>
                <button onclick="muatDataStok()" class="btn btn-sm btn-outline-secondary">🔄 Refresh</button>
            </div>
            <input type="text" id="cariBarang" class="form-control form-control-sm mb-3" placeholder="Cari ID, nama, kategori atau lokasi...">
            <div id="loading" class="text-center my-3">Memuat data...</div>
            <div class="list-group" id="listStok"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const API_URL = "URL_WEB_APP_ANDA_DISINI"; 

    document.addEventListener("DOMContentLoaded", muatDataStok);

    async function muatDataStok() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('listStok').innerHTML = '';
        
        try {
            let response = await fetch(API_URL);
            let data = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            renderList(data);

            document.getElementById('cariBarang').addEventListener('input', function(e) {
                let keyword = e.target.value.toLowerCase();
                let filtered = data.filter(item => 
                    item.nama.toLowerCase().includes(keyword) || 
                    item.kategori.toLowerCase().includes(keyword) ||
                    item.id.toLowerCase().includes(keyword) ||
                    item.lokasi.toLowerCase().includes(keyword)
                );
                renderList(filtered);
            });

        } catch (error) {
            document.getElementById('loading').innerText = 'Gagal memuat data.';
            console.error(error);
        }
    }

    function renderList(data) {
        const container = document.getElementById('listStok');
        container.innerHTML = '';
        
        if(data.length === 0) {
            container.innerHTML = '<div class="text-center text-muted small py-3">Barang tidak ditemukan</div>';
            return;
        }

        data.forEach(item => {
            let badgeColor = item.stok <= 5 ? 'bg-danger' : 'bg-primary';
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center border-start-0 border-end-0 px-0 py-3">
                    <div>
                        <h6 class="mb-0 fw-bold">${item.nama}</h6>
                        <small class="text-muted">${item.id} • Kat: ${item.kategori} • Lokasi: ${item.lokasi}</small>
                    </div>
                    <span class="badge ${badgeColor} rounded-pill fs-6">${item.stok}</span>
                </div>
            `;
        });
    }

    async function kirimTransaksi(jenis) {
        const id = document.getElementById('txId').value;
        const jumlah = document.getElementById('txJumlah').value;

        if (!id || !jumlah) {
            alert('Mohon isi ID Barang dan Jumlah!');
            return;
        }

        try {
            let response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: id, jumlah: jumlah, jenis: jenis })
            });
            let hasil = await response.json();
            alert(hasil.status);
            
            document.getElementById('formTransaksi').reset();
            muatDataStok();
        } catch (error) {
            alert('Gagal memproses data.');
        }
    }

    async function tambahBarangBaru() {
        const id = document.getElementById('newId').value;
        const nama = document.getElementById('newNama').value;
        const kategori = document.getElementById('newKategori').value;
        const stok = document.getElementById('newStok').value;
        const lokasi = document.getElementById('newLokasi').value;

        if (!id || !nama || !kategori || !lokasi) {
            alert('Mohon lengkapi semua kolom barang baru!');
            return;
        }

        try {
            let response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: id, nama: nama, kategori: kategori, stok: stok, lokasi: lokasi, jenis: 'baru' })
            });
            let hasil = await response.json();
            alert(hasil.status);
            
            if(!hasil.status.includes("Error")) {
                document.getElementById('formBarangBaru').reset();
                muatDataStok();
                // Pindah kembali ke tab update stok setelah berhasil
                document.getElementById('update-tab').click();
            }
        } catch (error) {
            alert('Gagal menyimpan barang baru.');
        }
    }
</script>
</body>
</html>
