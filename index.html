<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Stok Barang - SIMBA MAKASAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-custom { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hasil-pencarian { 
            max-height: 200px; 
            overflow-y: auto; 
            position: absolute; 
            z-index: 1000; 
            width: 100%; 
        }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">SIMBA MAKASAR</h3>
        <p class="text-muted small">Pencarian & Update Stok Cepat</p>
    </div>

    <div class="card card-custom border-0 mb-4">
        <div class="card-body p-4">
            <h5 class="card-title fw-bold mb-4 text-secondary">📥 / 📤 Update Stok Barang</h5>
            <form id="formTransaksi">
                
                <div class="mb-3 position-relative">
                    <label class="form-label small fw-bold text-dark">Cari & Pilih Nama Barang</label>
                    <input type="text" id="cariNamaInput" class="form-control" placeholder="Ketik nama atau ID barang..." autocomplete="off">
                    
                    <input type="hidden" id="txId"> 
                    
                    <div id="dropdownHasil" class="list-group hasil-pencarian shadow-sm d-none"></div>
                </div>

                <div id="infoBarangTerpilih" class="alert alert-info d-none py-2 px-3 small mb-3">
                    <strong>Terpilih:</strong> <span id="lblNamaBarang">-</span> (<span id="lblIdBarang">-</span>) <br>
                    <span class="text-muted">Stok Sekarang: <b id="lblStokSekarang">-</b> | Lokasi: <span id="lblLokasiBarang">-</span></span>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-dark">Jumlah Perubahan</label>
                    <input type="number" id="txJumlah" class="form-control" min="1" value="1" required>
                </div>
                
                <div class="row g-2">
                    <div class="col-6">
                        <button type="button" onclick="kirimTransaksi('masuk')" class="btn btn-success w-100 fw-bold py-2">📥 Barang Masuk</button>
                    </div>
                    <div class="col-6">
                        <button type="button" onclick="kirimTransaksi('keluar')" class="btn btn-danger w-100 fw-bold py-2">📤 Barang Keluar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card card-custom border-0">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="card-title fw-bold m-0 text-secondary">Semua Data Stok</h6>
                <button onclick="muatDataStok()" class="btn btn-sm btn-outline-secondary">🔄 Refresh</button>
            </div>
            
            <div id="loading" class="text-center my-3 text-muted small">Memuat database...</div>
            <div class="list-group list-group-flush" id="listStok"></div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbwDucogQ2PHEaODrG8hIhddfl9MzhiKlaruLYLE5ajU/dev"; 

    let masterDataBarang = []; // Tempat menyimpan data dari Google Sheets global

    document.addEventListener("DOMContentLoaded", muatDataStok);

    // 1. Fungsi Mengambil Data dari Google Sheets
    async function muatDataStok() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('listStok').innerHTML = '';
        
        try {
            let response = await fetch(API_URL);
            masterDataBarang = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            renderListUtama(masterDataBarang);
            inisialisasiPencarianForm();

        } catch (error) {
            document.getElementById('loading').innerText = 'Gagal memuat data.';
            console.error(error);
        }
    }

    // 2. Tampilkan Daftar Stok Utama di Bagian Bawah
    function renderListUtama(data) {
        const container = document.getElementById('listStok');
        container.innerHTML = '';
        
        data.forEach(item => {
            let badgeColor = item.stok <= 5 ? 'bg-danger' : 'bg-primary';
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-2">
                    <div>
                        <strong class="text-dark d-block mb-0">${item.nama}</strong>
                        <span class="text-muted small">${item.id} • ${item.kategori} • Lokasi: ${item.lokasi}</span>
                    </div>
                    <span class="badge ${badgeColor} rounded-pill fs-6">${item.stok}</span>
                </div>
            `;
        });
    }

    // 3. Logika Pencarian Nama Barang di Kolom Input Form
    function inisialisasiPencarianForm() {
        const inputCari = document.getElementById('cariNamaInput');
        const dropdown = document.getElementById('dropdownHasil');

        inputCari.addEventListener('input', function() {
            let keyword = this.value.toLowerCase();
            dropdown.innerHTML = '';

            if (keyword.length === 0) {
                dropdown.classList.add('d-none');
                return;
            }

            // Filter barang berdasarkan nama atau ID
            let hasilFilter = masterDataBarang.filter(item => 
                item.nama.toLowerCase().includes(keyword) || 
                item.id.toLowerCase().includes(keyword)
            );

            if (hasilFilter.length > 0) {
                dropdown.classList.remove('d-none');
                hasilFilter.forEach(item => {
                    let tombolItem = document.createElement('button');
                    tombolItem.type = 'button';
                    tombolItem.className = 'list-group-item list-group-item-action text-start small';
                    tombolItem.innerHTML = `<b>${item.nama}</b> <span class="text-muted">(${item.id}) - Stok: ${item.stok}</span>`;
                    
                    // Jika item dropdown diklik
                    tombolItem.addEventListener('click', function() {
                        pilihBarang(item);
                    });
                    
                    dropdown.appendChild(tombolItem);
                });
            } else {
                dropdown.innerHTML = '<div class="list-group-item text-muted small">Barang tidak ditemukan</div>';
                dropdown.classList.remove('d-none');
            }
        });

        // Sembunyikan dropdown jika klik di luar area input
        document.addEventListener('click', function(e) {
            if (e.target !== inputCari) {
                dropdown.classList.add('d-none');
            }
        });
    }

    // 4. Aksi Ketika Nama Barang Dipilih dari Dropdown Pencarian
    function pilihBarang(item) {
        document.getElementById('cariNamaInput').value = item.nama;
        document.getElementById('txId').value = item.id;
        
        // Tampilkan kotak info barang terpilih
        document.getElementById('lblNamaBarang').innerText = item.nama;
        document.getElementById('lblIdBarang').innerText = item.id;
        document.getElementById('lblStokSekarang').innerText = item.stok;
        document.getElementById('lblLokasiBarang').innerText = item.lokasi;
        document.getElementById('infoBarangTerpilih').classList.remove('d-none');
        
        document.getElementById('dropdownHasil').classList.add('d-none');
    }

    // 5. Fungsi Mengirim Transaksi Update Stok ke Google Sheets
    async function kirimTransaksi(jenis) {
        const id = document.getElementById('txId').value;
        const jumlah = document.getElementById('txJumlah').value;
        const namaBarang = document.getElementById('lblNamaBarang').innerText;

        if (!id) {
            alert('Silakan cari dan pilih barang terlebih dahulu melalui kolom pencarian!');
            return;
        }

        if (!jumlah || jumlah < 1) {
            alert('Masukkan jumlah perubahan stok yang valid!');
            return;
        }

        if (confirm(`Apakah Anda yakin ingin mencatat barang [ ${jenis.toUpperCase()} ] untuk "${namaBarang}" sebanyak ${jumlah} pcs?`)) {
            try {
                let response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, jumlah: jumlah, jenis: jenis })
                });
                let hasil = await response.json();
                
                alert(hasil.status);
                
                // Reset Form & Sembunyikan Info
                document.getElementById('formTransaksi').reset();
                document.getElementById('infoBarangTerpilih').classList.add('d-none');
                document.getElementById('txId').value = "";
                
                // Muat ulang data terbaru dari Google Sheets
                muatDataStok();
            } catch (error) {
                alert('Gagal memperbarui stok ke server.');
                console.error(error);
            }
        }
    }
</script>
</body>
</html>
